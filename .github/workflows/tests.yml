name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel_name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel_name: '11'
            laravel: '^11.35'
            testbench: '^9.15'
            pest: '^3.0'
            phpunit: '^11.0'
            allow_insecure_framework_solve: true
          - php: '8.2'
            laravel_name: '12'
            laravel: '^12.0'
            testbench: '^10.0'
            pest: '^3.0'
            phpunit: '^11.0'
            allow_insecure_framework_solve: false
          - php: '8.3'
            laravel_name: '12'
            laravel: '^12.0'
            testbench: '^10.0'
            pest: '^3.0'
            phpunit: '^11.0'
            allow_insecure_framework_solve: false
          - php: '8.3'
            laravel_name: '13'
            laravel: '^13.0'
            testbench: '^11.0'
            pest: '^4.0'
            phpunit: '^12.0'
            allow_insecure_framework_solve: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, openssl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Allow Laravel 11 compatibility solve
        if: ${{ matrix.allow_insecure_framework_solve }}
        run: composer config policy.advisories.block false

      - name: Install dependencies
        run: |
          composer update \
            --with laravel/framework:${{ matrix.laravel }} \
            --with orchestra/testbench:${{ matrix.testbench }} \
            --with pestphp/pest:${{ matrix.pest }} \
            --with phpunit/phpunit:${{ matrix.phpunit }} \
            --with-all-dependencies \
            --no-interaction \
            --prefer-dist

      - name: Validate composer manifest
        run: composer validate --strict --no-check-publish

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Run Pest
        run: vendor/bin/pest
